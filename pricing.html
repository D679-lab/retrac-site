<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrac - Versions</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#07070a;
    color:white;
}

/* background glow */
.bg{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,45,45,0.18), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,45,45,0.10), transparent 40%);
    z-index:-1;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
    text-align:center;
}

h1{
    font-size:2.8rem;
}

p{
    color:#aaa;
}

/* grid */
.grid{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

/* cards */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:25px;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-6px);
    border-color:#ff2d2d;
}

.card h2{
    color:#ff2d2d;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background:linear-gradient(135deg,#ff2d2d,#ff5a5a);
    color:white;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>Choose Version</h1>
<p>Select your access type</p>

<div class="grid">

    <div class="card">
        <h2>Free</h2>
        <p>Download ZIP version</p>
        <a class="btn" href="free.html">Open</a>
    </div>

    <div class="card">
        <h2>Pro</h2>
        <p>Premium features</p>
        <a class="btn" href="paid.html">Open</a>
    </div>

</div>

</div>

</body>
</html>
